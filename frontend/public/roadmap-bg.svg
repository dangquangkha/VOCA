<svg width="1920" height="1080" viewBox="0 0 1920 1080" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="skyGradient" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" style="stop-color:#0B1026;stop-opacity:1" />
      <stop offset="40%" style="stop-color:#1B264F;stop-opacity:1" />
      <stop offset="70%" style="stop-color:#2E4C80;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4B7CB0;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="horizonGlow" cx="50%" cy="100%" r="70%" fx="50%" fy="100%">
      <stop offset="0%" style="stop-color:#FF9A8B;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#FF9A8B;stop-opacity:0" />
    </radialGradient>
    <filter id="starBlur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1" />
    </filter>
  </defs>
  
  <!-- Sky Base -->
  <rect width="1920" height="1080" fill="url(#skyGradient)" />
  
  <!-- Horizon Glow -->
  <rect width="1920" height="1080" fill="url(#horizonGlow)" />
  
  <!-- Stars -->
  <g id="stars">
    <!-- Generative stars would be better, but we'll add some manual ones -->
    <circle cx="200" cy="150" r="1.5" fill="white" opacity="0.8" filter="url(#starBlur)" />
    <circle cx="450" cy="80" r="1" fill="white" opacity="0.6" />
    <circle cx="700" cy="200" r="2" fill="#A5D6F7" opacity="0.9" filter="url(#starBlur)" />
    <circle cx="1100" cy="120" r="1" fill="white" opacity="0.7" />
    <circle cx="1500" cy="300" r="1.5" fill="white" opacity="0.5" />
    <circle cx="1800" cy="50" r="1" fill="#FFD700" opacity="0.6" />
    <circle cx="100" cy="400" r="1" fill="white" opacity="0.4" />
    <circle cx="600" cy="350" r="1.5" fill="white" opacity="0.7" />
    <circle cx="1300" cy="50" r="2" fill="white" opacity="0.9" />
    <circle cx="1700" cy="450" r="1" fill="white" opacity="0.3" />
  </g>
  
  <!-- Subtle Clouds (Circles with blur) -->
  <g opacity="0.1">
    <ellipse cx="1600" cy="800" rx="400" ry="200" fill="white" filter="url(#starBlur)" />
    <ellipse cx="400" cy="900" rx="500" ry="150" fill="white" filter="url(#starBlur)" />
  </g>
</svg>
