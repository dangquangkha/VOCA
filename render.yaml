services:
  - type: web
    name: voca-backend
    env: python
    region: singapore
    buildCommand: "cd backend && pip install -r requirements.txt"
    startCommand: "cd backend && alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOW_MOCK_LOGIN
        value: "false"
      - key: RESEND_KEY
        sync: false
      - key: EMAILS_FROM_EMAIL
        sync: false
