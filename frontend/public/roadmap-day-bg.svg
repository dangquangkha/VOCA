<svg width="1920" height="1080" viewBox="0 0 1920 1080" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="dayGradient" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" style="stop-color:#00A4FD;stop-opacity:1" />
      <stop offset="60%" style="stop-color:#7DD3FC;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E0F2FE;stop-opacity:1" />
    </linearGradient>
    <filter id="cloudBlur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="40" />
    </filter>
  </defs>
  
  <!-- Sky Base -->
  <rect width="1920" height="1080" fill="url(#dayGradient)" />
  
  <!-- Stylized Clouds -->
  <g opacity="0.4" filter="url(#cloudBlur)">
    <circle cx="400" cy="300" r="200" fill="white" />
    <circle cx="600" cy="250" r="150" fill="white" />
    <circle cx="1500" cy="400" r="300" fill="white" />
    <circle cx="1700" cy="350" r="250" fill="white" />
    <circle cx="1000" cy="100" r="100" fill="white" />
  </g>
  
  <!-- Sun Glow -->
  <circle cx="1800" cy="100" r="400" fill="white" opacity="0.1" filter="url(#cloudBlur)" />
</svg>
